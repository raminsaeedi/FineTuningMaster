# ============================================================
# Model config: Qwen/Qwen2.5-1.5B-Instruct
# ============================================================
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  torch_dtype: "float16"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  fp16: false
  bf16: false

slurm:
  mem: "24G"
  time_train: "02:00:00"
  time_infer: "00:45:00"
  model_short: "qwen15b"
