# ============================================================
# Model config: Qwen/Qwen2.5-3B-Instruct
# ============================================================
model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  torch_dtype: "bfloat16"       # bf16 recommended on A100/H100 at this size

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  fp16: false
  bf16: true                    # Enable on capable hardware (A100, H100)

slurm:
  mem: "40G"
  time_train: "04:00:00"
  time_infer: "01:00:00"
  model_short: "qwen3b"
