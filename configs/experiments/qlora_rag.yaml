# ============================================================
# Experiment: QLoRA + RAG (Retrieval-Augmented Generation)
# Same LoRA configuration as the QLoRA baseline, but inference
# injects relevant guideline context into the system prompt via
# TF-IDF retrieval over rag/guidelines/*.md
#
# Setup (one-time):
#   python -m rag.indexer
#
# Then train and run inference as usual — RAG is applied automatically
# during inference when rag.enabled: true.
# ============================================================
algorithm:
  name: "qlora"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_dora: false
  use_rslora: false
  use_loftq: false

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

rag:
  enabled: true
  top_k: 3    # number of guideline sections to retrieve per brief
