# Full fine-tuning — PLACEHOLDER (not implemented in v1).
# Reference baseline only; very expensive. To implement: register a trainer
# keyed "full_ft" that trains all weights (no LoRA/quantization), then set
# `type: full_ft`. Using this config as-is raises a clear KeyError.
type: full_ft

sft:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
