# Root Hydra config. Composed defaults are overridden by experiment files in
# configs/experiment/ (selected with `+experiment=<name>`). Scripts wrap Hydra,
# so end users never write Hydra syntax directly.
defaults:
  - model: qwen2_5_0_5b
  - method: prompt_only
  - data: dashboard_v1
  - training: qlora_default
  - eval: full
  - _self_

seed: 42
log_level: INFO

output_root: experiments/outputs/experiments
experiment_name: default
experiment_id: ${experiment_name}_${seed}

# Experiment tracking is left present but disabled in v1.
tracking:
  use_wandb: false
  project: thesis-dashboard-llm
