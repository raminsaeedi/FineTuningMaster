# DoRA — implemented via the QLoRA SFT trainer with use_dora=True (PEFT native).
# Weight-Decomposed Low-Rank Adaptation (Liu et al., ICML 2024).
type: qlora_sft

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  use_dora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

sft:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  gradient_checkpointing: true
