# Plain LoRA (no 4-bit quantization). Uses the same SFT trainer with
# quantization disabled, so the base model is loaded in fp16 and LoRA is applied
# directly. Functional, intended for a no-quantization ablation.
type: qlora_sft

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: false

sft:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: false
  bf16: false
  logging_steps: 10
  save_steps: 50
  save_total_limit: 2
  eval_strategy: "no"
  report_to: "none"
  gradient_checkpointing: true
  dataloader_pin_memory: false
  packing: false
