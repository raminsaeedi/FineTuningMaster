# ============================================================
# Experiment: LoftQ (LoRA-Fine-Tuning-Aware Quantization)
# Paper: Guo et al., NeurIPS 2024 — https://arxiv.org/abs/2310.08659
# Implementation: use LoftQConfig from PEFT instead of BitsAndBytesConfig
# Requires: peft >= 0.10.0
#
# Key insight: jointly optimizes quantization error and LoRA initialization.
# Standard QLoRA quantizes first, then initializes LoRA to zeros — LoftQ
# finds LoRA weights that best compensate for quantization error, yielding
# better task performance at the same memory footprint.
# Status: PLACEHOLDER — see algorithms/loftq.py
# ============================================================
algorithm:
  name: "loftq"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_loftq: true
  # LoftQ-specific settings
  loftq_num_bits: 4             # Quantization bits (4 or 8)
  loftq_num_iter: 1             # Alternating optimization iterations (1–5)

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
