# ============================================================
# Experiment: RSLoRA (Rank-Stabilized LoRA)
# Paper: Kalajdzievski, 2024 — https://arxiv.org/abs/2312.03732
# Implementation: set use_rslora=True in PEFT LoraConfig
# Requires: peft >= 0.8.0
#
# Key insight: standard LoRA uses alpha/r scaling which destabilizes
# training at high ranks. RSLoRA uses alpha/sqrt(r) for rank-stable
# behaviour, enabling effective training at r=64 or r=128.
# Status: PLACEHOLDER — see algorithms/rslora.py
# ============================================================
algorithm:
  name: "rslora"

lora:
  r: 32                         # Higher rank is now stable with RSLoRA
  lora_alpha: 32
  lora_dropout: 0.05
  use_rslora: true              # The only change vs QLoRA

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
