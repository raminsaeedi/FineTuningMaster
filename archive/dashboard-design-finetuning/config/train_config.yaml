# ============================================================
# train_config.yaml
# Central configuration for the dashboard-design-finetuning project.
# All scripts read settings from this file.
# ============================================================

# ------------------------------------------------------------
# MODEL
# ------------------------------------------------------------
model:
  # HuggingFace model ID – downloaded automatically on first run (~1 GB)
  name: "Qwen/Qwen2.5-0.5B-Instruct"

  # Maximum token length for input + output combined.
  # Reduce to 1024 if you run out of memory.
  max_seq_length: 2048

  # QLoRA: load model in 4-bit precision to save GPU memory.
  # Set to false on CPU-only machines or Apple Silicon.
  load_in_4bit: true

  # Alternative: 8-bit quantization (less memory saving than 4-bit)
  load_in_8bit: false

# ------------------------------------------------------------
# LORA (Low-Rank Adaptation)
# ------------------------------------------------------------
lora:
  # Rank of the LoRA update matrices.
  # Higher = more trainable parameters = better quality but more memory.
  # Good values: 8 (fast), 16 (balanced), 32 (quality), 64 (slow)
  r: 16

  # Scaling factor. Rule of thumb: lora_alpha = 2 * r
  lora_alpha: 32

  # Dropout for regularization. 0.05 is a safe default.
  lora_dropout: 0.05

  # Which bias parameters to train. "none" is standard for QLoRA.
  bias: "none"

  # Which layers to apply LoRA to.
  # These are the attention and MLP projection layers in Qwen2.5.
  target_modules:
    - "q_proj" # Query projection (attention)
    - "k_proj" # Key projection (attention)
    - "v_proj" # Value projection (attention)
    - "o_proj" # Output projection (attention)
    - "gate_proj" # Gate projection (MLP)
    - "up_proj" # Up projection (MLP)
    - "down_proj" # Down projection (MLP)

# ------------------------------------------------------------
# DATASET PATHS
# ------------------------------------------------------------
data:
  # Raw generated data (before formatting)
  raw_dir: "./data/raw"

  # Formatted JSONL files ready for training
  train_file: "./data/processed/train.jsonl"
  val_file: "./data/processed/val.jsonl"
  test_file: "./data/processed/test.jsonl"

  # Number of examples to generate
  num_train: 80
  num_val: 10
  num_test: 10

  # Random seed for reproducibility
  seed: 42

# ------------------------------------------------------------
# TRAINING
# ------------------------------------------------------------
training:
  # Where to save checkpoints during training
  output_dir: "./outputs/models/checkpoints"

  # Number of full passes through the training data.
  # 3 is a good starting point. Try 5 for better quality.
  num_epochs: 3

  # Examples processed per GPU per step.
  # Reduce to 1 if you get "CUDA out of memory".
  batch_size: 2

  # Simulates a larger batch by accumulating gradients.
  # Effective batch size = batch_size * gradient_accumulation_steps = 2 * 4 = 8
  gradient_accumulation_steps: 4

  # Learning rate. 2e-4 is a standard starting point for LoRA.
  learning_rate: 2.0e-4

  # Learning rate schedule. "cosine" gradually reduces LR during training.
  lr_scheduler: "cosine"

  # Fraction of training steps used for LR warmup.
  warmup_ratio: 0.1

  # L2 regularization to prevent overfitting.
  weight_decay: 0.01

  # Mixed precision training.
  # fp16: true  → use on NVIDIA GPUs (most common)
  # bf16: true  → use on A100/H100 GPUs (better numerical stability)
  # Both false  → CPU training (very slow)
  fp16: false
  bf16: false

  # Log training loss every N steps.
  logging_steps: 10

  # Save a checkpoint every N steps.
  save_steps: 50

  # Keep only the last N checkpoints (saves disk space).
  save_total_limit: 2

  # Random seed for reproducibility.
  seed: 42

  # Gradient checkpointing: saves VRAM at cost of ~20% slower training.
  gradient_checkpointing: true

# ------------------------------------------------------------
# INFERENCE
# ------------------------------------------------------------
inference:
  # Path to the saved LoRA adapter (created by script 04)
  adapter_path: "./outputs/models/final"

  # Maximum number of new tokens to generate
  max_new_tokens: 1024

  # Temperature: lower = more deterministic output
  # 0.1 is good for structured JSON output
  temperature: 0.1

  # Top-p nucleus sampling
  top_p: 0.9

  # Whether to use sampling (true) or greedy decoding (false)
  do_sample: true

# ------------------------------------------------------------
# OUTPUT PATHS
# ------------------------------------------------------------
paths:
  models_dir: "./outputs/models"
  final_model_dir: "./outputs/models/final"
  logs_dir: "./outputs/logs"
  predictions_dir: "./outputs/predictions"
